<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AngelCase</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
  <div class="app">

    <header class="topbar">
      <div>
        <div class="brand">👼 AngelCase</div>
        <div class="subtitle" id="pageSubtitle">Кейсы</div>
      </div>

      <div class="balance-box">
        <span class="balance-label">Баланс</span>
        <span class="balance-value" id="balanceValue">0.000 TON</span>
      </div>
    </header>

    <main class="content">

      <!-- CASES PAGE -->
      <section id="casesPage" class="page active">
        <div id="casesGrid" class="cases-grid"></div>
      </section>

      <!-- CASE DETAIL PAGE -->
      <section id="caseDetailPage" class="page">
        <div class="case-detail-header">
          <button id="backToCasesBtn" class="back-btn">← Назад</button>
        </div>

        <div class="case-detail-hero">
          <div class="case-detail-image" id="caseDetailImage">🎁</div>
          <div class="case-detail-title" id="caseDetailTitle">Case</div>
          <div class="case-detail-price" id="caseDetailPrice">0.00 TON</div>
          <button id="openCaseBtn" class="primary-btn open-case-btn">Открыть</button>
        </div>

        <div class="case-items-title">Содержимое кейса</div>
        <div id="caseItemsGrid" class="case-items-grid"></div>
      </section>

      <!-- INVENTORY PAGE -->
      <section id="inventoryPage" class="page">
        <div class="section-card">
          <div class="section-title">Инвентарь</div>
          <div id="inventoryList" class="inventory-list">
            <div class="inventory-empty">Пока пусто</div>
          </div>
        </div>
      </section>

      <!-- PROFILE PAGE -->
      <section id="profilePage" class="page">
        <div class="section-card">
          <div class="section-title">Профиль</div>

          <div class="profile-row">
            <span>Telegram</span>
            <span id="telegramName">Гость</span>
          </div>

          <div class="profile-row">
            <span>ID</span>
            <span id="telegramId">—</span>
          </div>

          <div class="profile-row">
            <span>Кошелёк</span>
            <span id="walletValue">Не подключён</span>
          </div>

          <div id="tonConnectButton" class="ton-connect-wrap"></div>
        </div>

        <div class="section-card">
          <div class="section-title">Пополнение TON</div>

          <label class="field-label">Сумма в TON</label>
          <input
            id="topupAmount"
            class="field-input"
            type="number"
            min="0.1"
            step="0.1"
            placeholder="Например, 2"
          />

          <div class="wallet-box">
            <div class="wallet-box-label">Кошелёк получателя</div>
            <div class="wallet-box-address">
              UQBwcw41wYAnPcQuHFtB9a_khXQLQR3LUCq5hMsyyQGuj37k
            </div>
          </div>

          <button id="payTonBtn" class="primary-btn">Отправить TON</button>

          <div id="depositInfo" class="hint-text">
            Здесь будет статус пополнения.
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button id="navCases" class="nav-btn active">Кейсы</button>
      <button id="navInventory" class="nav-btn">Инвентарь</button>
      <button id="navProfile" class="nav-btn">Профиль</button>
    </nav>
  </div>

  <div id="winPopup" class="popup">
    <div class="popup-content">
      <div class="popup-title">Выигрыш</div>
      <div id="popupItem" class="popup-item">Gift</div>
      <div id="popupSubtext" class="popup-subtext"></div>
      <button id="claimBtn" class="primary-btn">Забрать</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
