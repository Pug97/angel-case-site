<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Angel Case</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

  <div class="container">
    <h1 class="logo">👼 Angel Case</h1>

    <div class="roulette">
      <div class="marker"></div>
      <div id="items"></div>
    </div>

    <button id="openCase">Open Case</button>
  </div>

  <div id="winPopup" class="popup">
    <div class="popup-content">
      <h2>You won</h2>
      <div id="popupItem"></div>
      <button id="claimBtn">Claim reward</button>
    </div>
  </div>

  <audio id="spinSound" preload="auto">
    <source src="z_uk-ruletki.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>

</body>
</html>
